# Keeps SHA-pinned GitHub Actions (and their version comments) up to date, so
# the supply-chain pins in ci.yml / deploy.yml don't silently rot.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
