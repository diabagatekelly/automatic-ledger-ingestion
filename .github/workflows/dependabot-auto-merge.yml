name: Dependabot auto-merge

# Auto-merge Dependabot **patch and minor** updates once they are green and up to
# date. Both conditions are enforced by branch protection on `main`
# (required check: `quality`; "require branches to be up to date" = strict), so
# this workflow only flips on GitHub-native auto-merge — GitHub itself does the
# waiting and refuses to merge anything that goes red. **Major** bumps are left
# open for manual review (a major can change runtime behavior the tests miss).
#
# Ordering: because `main` is strict, merging one PR puts the rest "behind";
# Dependabot rebases them one at a time, so the queue drains roughly oldest-first.

on: pull_request

# Least privilege: only what enabling auto-merge on the PR needs. Dependabot
# `pull_request` runs get a read-only token unless the workflow grants more, and
# these grants apply solely to this job.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Act only on Dependabot's own PRs — never on human contributors'.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Enable auto-merge for patch & minor updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
